<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умные счетчики | Мониторинг электроэнергии</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 28px;
            color: #1e293b;
        }

        .logo span {
            color: #667eea;
            font-weight: 300;
        }

        .stats-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 500;
        }

        /* Карточки городов */
        .cities-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .city-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .city-card:hover {
            transform: translateY(-5px);
        }

        .city-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .city-icon {
            font-size: 24px;
        }

        .city-name {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }

        .city-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        /* Кнопки экспорта */
        .export-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .export-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .export-btn.excel {
            background: #28a745;
            color: white;
        }

        .export-btn.pdf {
            background: #dc3545;
            color: white;
        }

        .export-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Таблица */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
        }

        .filter-select {
            padding: 10px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            color: #1e293b;
            background: white;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-select:focus {
            border-color: #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
            font-size: 14px;
        }

        th:first-child {
            border-radius: 10px 0 0 10px;
        }

        th:last-child {
            border-radius: 0 10px 10px 0;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
            font-size: 14px;
        }

        .device-id {
            background: #eff6ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            font-size: 13px;
        }

        .location-info {
            display: flex;
            flex-direction: column;
        }

        .city-tag {
            font-weight: 600;
            color: #1e293b;
        }

        .address {
            font-size: 12px;
            color: #64748b;
        }

        .status-online {
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-online::before {
            content: "●";
            font-size: 16px;
        }

        .status-offline {
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-offline::before {
            content: "○";
            font-size: 16px;
        }

        .consumed-value {
            font-weight: 600;
            color: #059669;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .last-update {
            text-align: right;
            color: #94a3b8;
            font-size: 13px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .cities-grid {
                grid-template-columns: 1fr;
            }
            
            .export-buttons {
                flex-direction: column;
            }
            
            table {
                font-size: 13px;
            }
            
            td, th {
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">
                <h1>⚡ УМНЫЕ СЧЕТЧИКИ <span>| Мониторинг электроэнергии</span></h1>
            </div>
            <div class="stats-badge" id="totalStats">
                Загрузка...
            </div>
        </div>

        <!-- Карточки городов (ровно 3) -->
        <div class="cities-grid" id="citiesGrid">
            <div class="city-card">
                <div class="city-header">
                    <span class="city-icon">🏙️</span>
                    <span class="city-name">Москва</span>
                </div>
                <div class="city-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="mskCount">0</div>
                        <div class="stat-label">счетчиков</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="mskConsumed">0</div>
                        <div class="stat-label">кВт·ч</div>
                    </div>
                </div>
            </div>
            <div class="city-card">
                <div class="city-header">
                    <span class="city-icon">🏭</span>
                    <span class="city-name">Санкт-Петербург</span>
                </div>
                <div class="city-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="spbCount">0</div>
                        <div class="stat-label">счетчиков</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="spbConsumed">0</div>
                        <div class="stat-label">кВт·ч</div>
                    </div>
                </div>
            </div>
            <div class="city-card">
                <div class="city-header">
                    <span class="city-icon">🏡</span>
                    <span class="city-name">Казань</span>
                </div>
                <div class="city-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="kznCount">0</div>
                        <div class="stat-label">счетчиков</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="kznConsumed">0</div>
                        <div class="stat-label">кВт·ч</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопки экспорта -->
        <div class="export-buttons">
            <button class="export-btn excel" onclick="exportToExcel()">
                <span>📥</span> Скачать Excel (все показания)
            </button>
            <button class="export-btn pdf" onclick="exportToPDF()">
                <span>📥</span> Скачать PDF (все показания)
            </button>
        </div>

        <!-- Таблица счетчиков -->
        <div class="table-container">
            <div class="table-header">
                <div class="table-title">📋 Текущие показания счетчиков</div>
                <select class="filter-select" id="cityFilter" onchange="filterByCity()">
                    <option value="all">Все города</option>
                    <option value="Москва">Москва</option>
                    <option value="Санкт-Петербург">Санкт-Петербург</option>
                    <option value="Казань">Казань</option>
                </select>
            </div>
            <div style="overflow-x: auto;">
                <table id="metersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Город</th>
                            <th>Адрес</th>
                            <th>Помещение</th>
                            <th>Начальные</th>
                            <th>Текущие</th>
                            <th>Потреблено</th>
                            <th>Статус</th>
                            <th>Последнее</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="9" class="loading">
                                <div class="spinner"></div>
                                Загрузка данных...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4evtdt6oq7jnc168ke0';
        let metersData = null;
        let allDevices = [];

        // Загрузка данных
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                metersData = data;
                allDevices = Object.values(data.devices || {});
                updateDashboard(data);
                document.getElementById('lastUpdate').textContent = 
                    'Обновлено: ' + new Date().toLocaleString('ru-RU');
            } catch (error) {
                console.error(error);
                showError();
            }
        }

        // Обновление всей панели
        function updateDashboard(data) {
            updateCityStats(data.devices || {});
            updateTable(data.devices || {});
            updateTotalStats(data.devices || {});
        }

        // Обновление статистики по городам
        function updateCityStats(devices) {
            let mskCount = 0, mskConsumed = 0;
            let spbCount = 0, spbConsumed = 0;
            let kznCount = 0, kznConsumed = 0;
            
            for (let id in devices) {
                const dev = devices[id];
                const location = dev.location || '';
                
                if (location.includes('Москва')) {
                    mskCount++;
                    mskConsumed += dev.consumed || 0;
                } else if (location.includes('Санкт-Петербург') || location.includes('Питер')) {
                    spbCount++;
                    spbConsumed += dev.consumed || 0;
                } else if (location.includes('Казань')) {
                    kznCount++;
                    kznConsumed += dev.consumed || 0;
                }
            }
            
            document.getElementById('mskCount').textContent = mskCount;
            document.getElementById('mskConsumed').textContent = mskConsumed.toFixed(1);
            document.getElementById('spbCount').textContent = spbCount;
            document.getElementById('spbConsumed').textContent = spbConsumed.toFixed(1);
            document.getElementById('kznCount').textContent = kznCount;
            document.getElementById('kznConsumed').textContent = kznConsumed.toFixed(1);
        }

        // Обновление таблицы
        function updateTable(devices) {
            const tbody = document.getElementById('tableBody');
            const filter = document.getElementById('cityFilter').value;
            const now = new Date();
            
            let html = '';
            
            for (let id in devices) {
                const dev = devices[id];
                const location = dev.location || '';
                
                // Фильтр по городу
                if (filter !== 'all') {
                    if (!location.includes(filter)) continue;
                }
                
                const lastSeen = new Date(dev.timestamp);
                const isOnline = (now - lastSeen) < 30 * 60 * 1000; // 30 минут
                
                // Разбираем адрес
                const locationParts = location.split(',');
                const city = locationParts[0] || '-';
                const address = locationParts.slice(1).join(',').trim() || '-';
                
                html += `<tr>
                    <td><span class="device-id">${id}</span></td>
                    <td><span class="city-tag">${city}</span></td>
                    <td>${address}</td>
                    <td>${dev.description || '-'}</td>
                    <td>${(dev.initial || 0).toFixed(1)}</td>
                    <td><b>${(dev.current || 0).toFixed(1)}</b></td>
                    <td><span class="consumed-value">${(dev.consumed || 0).toFixed(1)}</span></td>
                    <td><span class="${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? 'Онлайн' : 'Офлайн'}</span></td>
                    <td>${dev.timestamp ? dev.timestamp.slice(0,16) : '-'}</td>
                </tr>`;
            }
            
            if (html === '') {
                html = '<tr><td colspan="9" style="text-align: center; padding: 30px;">Нет данных для отображения</td></tr>';
            }
            
            tbody.innerHTML = html;
        }

        // Обновление общей статистики
        function updateTotalStats(devices) {
            const total = Object.keys(devices).length;
            const online = Object.values(devices).filter(d => {
                return (new Date() - new Date(d.timestamp)) < 30 * 60 * 1000;
            }).length;
            
            document.getElementById('totalStats').innerHTML = 
                `📊 Всего: ${total} счетчиков | ✅ Онлайн: ${online}`;
        }

        // Фильтр по городу
        function filterByCity() {
            if (metersData) {
                updateTable(metersData.devices || {});
            }
        }

        // Экспорт в Excel
        function exportToExcel() {
            if (!metersData) return;
            
            const data = [['ID', 'Город', 'Адрес', 'Помещение', 'Начальные', 'Текущие', 'Потреблено', 'Статус', 'Последнее обновление']];
            const now = new Date();
            
            for (let id in metersData.devices) {
                const dev = metersData.devices[id];
                const location = dev.location || '';
                const locationParts = location.split(',');
                const city = locationParts[0] || '-';
                const address = locationParts.slice(1).join(',').trim() || '-';
                
                const lastSeen = new Date(dev.timestamp);
                const isOnline = (now - lastSeen) < 30 * 60 * 1000;
                
                data.push([
                    id,
                    city,
                    address,
                    dev.description || '-',
                    (dev.initial || 0).toFixed(1),
                    (dev.current || 0).toFixed(1),
                    (dev.consumed || 0).toFixed(1),
                    isOnline ? 'Онлайн' : 'Офлайн',
                    dev.timestamp || '-'
                ]);
            }
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Счетчики');
            XLSX.writeFile(wb, `meters_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        // Экспорт в PDF
        function exportToPDF() {
            if (!metersData) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            doc.setFont("helvetica");
            doc.setFontSize(18);
            doc.setTextColor(102, 126, 234);
            doc.text('Отчет по счетчикам электроэнергии', 14, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text('Дата: ' + new Date().toLocaleString('ru-RU'), 14, 28);
            
            const tableData = [];
            const now = new Date();
            
            for (let id in metersData.devices) {
                const dev = metersData.devices[id];
                const location = dev.location || '';
                const locationParts = location.split(',');
                const city = locationParts[0] || '-';
                const address = locationParts.slice(1).join(',').trim() || '-';
                
                const lastSeen = new Date(dev.timestamp);
                const isOnline = (now - lastSeen) < 30 * 60 * 1000;
                
                tableData.push([
                    id,
                    city,
                    address,
                    dev.description || '-',
                    (dev.initial || 0).toFixed(1),
                    (dev.current || 0).toFixed(1),
                    (dev.consumed || 0).toFixed(1),
                    isOnline ? 'Онлайн' : 'Офлайн'
                ]);
            }
            
            doc.autoTable({
                head: [['ID', 'Город', 'Адрес', 'Помещение', 'Нач.', 'Тек.', 'Потр.', 'Статус']],
                body: tableData,
                startY: 35,
                headStyles: { 
                    fillColor: [102, 126, 234],
                    halign: 'center'
                },
                styles: { 
                    fontSize: 8,
                    font: "helvetica",
                    cellPadding: 3
                },
                columnStyles: {
                    0: { cellWidth: 20, halign: 'center' },
                    1: { cellWidth: 30 },
                    2: { cellWidth: 50 },
                    3: { cellWidth: 30 },
                    4: { cellWidth: 20, halign: 'right' },
                    5: { cellWidth: 20, halign: 'right' },
                    6: { cellWidth: 20, halign: 'right' },
                    7: { cellWidth: 25, halign: 'center' }
                }
            });
            
            doc.save(`meters_${new Date().toISOString().slice(0,10)}.pdf`);
        }

        // Ошибка загрузки
        function showError() {
            document.getElementById('tableBody').innerHTML = 
                '<tr><td colspan="9" style="color: #ef4444; text-align: center;">Ошибка загрузки данных</td></tr>';
        }

        // Автообновление каждую минуту
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
