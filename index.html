<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умные счетчики | Мониторинг электроэнергии</title>
    <!-- Библиотеки для Excel и PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ОСНОВНЫЕ СТИЛИ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ШАПКА */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 28px;
            color: #1e293b;
        }

        .logo span {
            color: #667eea;
            font-weight: 300;
        }

        .stats-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 500;
        }

        /* КНОПКИ ЭКСПОРТА */
        .export-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .export-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
            color: #1e293b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .export-btn.excel {
            background: #28a745;
            color: white;
        }

        .export-btn.pdf {
            background: #dc3545;
            color: white;
        }

        /* ТАБЛИЦА */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .table-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
        }

        .filter-input {
            padding: 10px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            width: 300px;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-input:focus {
            border-color: #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
            font-size: 14px;
        }

        th:first-child {
            border-radius: 10px 0 0 10px;
        }

        th:last-child {
            border-radius: 0 10px 10px 0;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
            font-size: 14px;
        }

        .device-id {
            background: #eff6ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            font-size: 13px;
        }

        .location-cell {
            max-width: 250px;
        }

        .description-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        .status-online {
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-online::before {
            content: "●";
            font-size: 16px;
        }

        .status-offline {
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-offline::before {
            content: "○";
            font-size: 16px;
        }

        .consumed-value {
            font-weight: 600;
            color: #059669;
        }

        .price-badge {
            background: #fef3c7;
            color: #d97706;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .last-update {
            text-align: right;
            color: #94a3b8;
            font-size: 13px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .export-buttons {
                flex-direction: column;
            }
            
            .filter-input {
                width: 100%;
            }
            
            table {
                font-size: 12px;
            }
            
            td, th {
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ШАПКА САЙТА -->
        <div class="header">
            <div class="logo">
                <h1>⚡ УМНЫЕ СЧЕТЧИКИ <span>| Мониторинг электроэнергии</span></h1>
            </div>
            <div class="stats-badge" id="totalStats">
                Загрузка...
            </div>
        </div>

        <!-- КНОПКИ ЭКСПОРТА -->
        <div class="export-buttons">
            <button class="export-btn excel" onclick="exportToExcel()">
                <span>📥</span> Скачать Excel (все показания)
            </button>
            <button class="export-btn pdf" onclick="exportToPDF()">
                <span>📥</span> Скачать PDF (все показания)
            </button>
            <button class="export-btn" onclick="exportMonthlyReport()">
                <span>📊</span> Отчет за текущий месяц
            </button>
        </div>

        <!-- ТАБЛИЦА СЧЕТЧИКОВ -->
        <div class="table-container">
            <div class="table-header">
                <div class="table-title">📋 Текущие показания счетчиков</div>
                <input type="text" class="filter-input" id="searchFilter" placeholder="🔍 Поиск по адресу или описанию..." onkeyup="filterTable()">
            </div>
            <div style="overflow-x: auto;">
                <table id="metersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Местоположение</th>
                            <th>Описание</th>
                            <th>Начальные</th>
                            <th>Текущие</th>
                            <th>Потреблено</th>
                            <th>Цена</th>
                            <th>Стоимость</th>
                            <th>Статус</th>
                            <th>Последнее</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="10" class="loading">
                                <div class="spinner"></div>
                                Загрузка данных...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        // ============================================
        // НАСТРОЙКИ (НЕ МЕНЯТЬ!)
        // ============================================
        const API_URL = 'https://functions.yandexcloud.net/d4evtdt6oq7jnc168ke0';
        
        // Глобальные переменные
        let metersData = null;
        let allDevices = [];

        // ============================================
        // ЗАГРУЗКА ДАННЫХ
        // ============================================
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                metersData = data;
                allDevices = Object.values(data.devices || {});
                updateDashboard(data);
                document.getElementById('lastUpdate').textContent = 
                    'Обновлено: ' + new Date().toLocaleString('ru-RU');
            } catch (error) {
                console.error(error);
                showError();
            }
        }

        // ============================================
        // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
        // ============================================
        function updateDashboard(data) {
            updateTable(data.devices || {});
            updateTotalStats(data.devices || {});
        }

        // Обновление таблицы
        function updateTable(devices) {
            const tbody = document.getElementById('tableBody');
            const searchTerm = document.getElementById('searchFilter').value.toLowerCase();
            const now = new Date();
            
            let html = '';
            
            for (let id in devices) {
                const dev = devices[id];
                
                // Поиск по адресу или описанию
                const locationMatch = (dev.location || '').toLowerCase().includes(searchTerm);
                const descMatch = (dev.description || '').toLowerCase().includes(searchTerm);
                if (searchTerm && !locationMatch && !descMatch) continue;
                
                const lastSeen = new Date(dev.timestamp);
                const isOnline = (now - lastSeen) < 30 * 60 * 1000; // 30 минут
                
                const consumed = dev.consumed || 0;
                const price = dev.price || 5;
                const cost = consumed * price;
                
                html += `<tr>
                    <td><span class="device-id">${id}</span></td>
                    <td class="location-cell">
                        <div class="location-text">${dev.location || '-'}</div>
                    </td>
                    <td>
                        <div class="description-text">${dev.description || '-'}</div>
                    </td>
                    <td>${(dev.initial || 0).toFixed(1)}</td>
                    <td><b>${(dev.current || 0).toFixed(1)}</b></td>
                    <td><span class="consumed-value">${consumed.toFixed(1)}</span></td>
                    <td><span class="price-badge">${price.toFixed(2)} ₽</span></td>
                    <td><b>${cost.toFixed(0)} ₽</b></td>
                    <td><span class="${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? 'Онлайн' : 'Офлайн'}</span></td>
                    <td>${dev.timestamp ? dev.timestamp.slice(0,16) : '-'}</td>
                </tr>`;
            }
            
            if (html === '') {
                html = '<tr><td colspan="10" style="text-align: center; padding: 30px;">Нет данных для отображения</td></tr>';
            }
            
            tbody.innerHTML = html;
        }

        // Фильтр таблицы
        function filterTable() {
            if (metersData) {
                updateTable(metersData.devices || {});
            }
        }

        // Общая статистика
        function updateTotalStats(devices) {
            const total = Object.keys(devices).length;
            const online = Object.values(devices).filter(d => {
                return (new Date() - new Date(d.timestamp)) < 30 * 60 * 1000;
            }).length;
            
            let totalConsumed = 0;
            let totalCost = 0;
            
            for (let id in devices) {
                const dev = devices[id];
                totalConsumed += dev.consumed || 0;
                totalCost += (dev.consumed || 0) * (dev.price || 5);
            }
            
            document.getElementById('totalStats').innerHTML = 
                `📊 Всего: ${total} | ✅ Онлайн: ${online} | ⚡ ${totalConsumed.toFixed(0)} кВт·ч | 💰 ${totalCost.toFixed(0)} ₽`;
        }

        // ============================================
        // ЭКСПОРТ В EXCEL
        // ============================================
        function exportToExcel() {
            if (!metersData) return;
            
            const data = [['ID', 'Местоположение', 'Описание', 'Начальные', 'Текущие', 'Потреблено', 'Цена', 'Стоимость', 'Статус', 'Последнее обновление']];
            const now = new Date();
            
            for (let id in metersData.devices) {
                const dev = metersData.devices[id];
                const lastSeen = new Date(dev.timestamp);
                const isOnline = (now - lastSeen) < 30 * 60 * 1000;
                const cost = (dev.consumed || 0) * (dev.price || 5);
                
                data.push([
                    id,
                    dev.location || '-',
                    dev.description || '-',
                    (dev.initial || 0).toFixed(1),
                    (dev.current || 0).toFixed(1),
                    (dev.consumed || 0).toFixed(1),
                    (dev.price || 5).toFixed(2),
                    cost.toFixed(0),
                    isOnline ? 'Онлайн' : 'Офлайн',
                    dev.timestamp || '-'
                ]);
            }
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Счетчики');
            XLSX.writeFile(wb, `meters_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        // ============================================
        // ЭКСПОРТ В PDF
        // ============================================
        function exportToPDF() {
            if (!metersData) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            doc.setFont("helvetica");
            doc.setFontSize(18);
            doc.setTextColor(102, 126, 234);
            doc.text('Отчет по счетчикам электроэнергии', 14, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text('Дата: ' + new Date().toLocaleString('ru-RU'), 14, 28);
            
            const tableData = [];
            const now = new Date();
            
            for (let id in metersData.devices) {
                const dev = metersData.devices[id];
                const isOnline = (now - new Date(dev.timestamp)) < 30 * 60 * 1000;
                const cost = (dev.consumed || 0) * (dev.price || 5);
                
                tableData.push([
                    id,
                    dev.location || '-',
                    dev.description || '-',
                    (dev.initial || 0).toFixed(1),
                    (dev.current || 0).toFixed(1),
                    (dev.consumed || 0).toFixed(1),
                    (dev.price || 5).toFixed(2) + '₽',
                    cost.toFixed(0) + '₽',
                    isOnline ? 'Онлайн' : 'Офлайн'
                ]);
            }
            
            doc.autoTable({
                head: [['ID', 'Местоположение', 'Описание', 'Нач.', 'Тек.', 'Потр.', 'Цена', 'Сумма', 'Статус']],
                body: tableData,
                startY: 35,
                headStyles: { 
                    fillColor: [102, 126, 234],
                    halign: 'center'
                },
                styles: { 
                    fontSize: 8,
                    font: "helvetica",
                    cellPadding: 3
                },
                columnStyles: {
                    0: { cellWidth: 15, halign: 'center' },
                    1: { cellWidth: 45 },
                    2: { cellWidth: 35 },
                    3: { cellWidth: 18, halign: 'right' },
                    4: { cellWidth: 18, halign: 'right' },
                    5: { cellWidth: 18, halign: 'right' },
                    6: { cellWidth: 18, halign: 'right' },
                    7: { cellWidth: 18, halign: 'right' },
                    8: { cellWidth: 20, halign: 'center' }
                }
            });
            
            doc.save(`meters_${new Date().toISOString().slice(0,10)}.pdf`);
        }

        // ============================================
        // МЕСЯЧНЫЙ ОТЧЕТ
        // ============================================
        function exportMonthlyReport() {
            if (!metersData || !metersData.all_data) return;
            
            const data = [['ID', 'Местоположение', 'Описание', 'Дата', 'Показания', 'Потреблено', 'Цена', 'Стоимость']];
            
            // Берем данные за текущий месяц
            const currentMonth = new Date().toISOString().slice(0,7);
            
            metersData.all_data.forEach(record => {
                if (record.timestamp.slice(0,7) === currentMonth) {
                    const cost = record.consumed * record.price;
                    data.push([
                        record.device_id,
                        record.location || '-',
                        record.description || '-',
                        record.timestamp.slice(0,10),
                        record.current.toFixed(1),
                        record.consumed.toFixed(1),
                        record.price.toFixed(2),
                        cost.toFixed(0)
                    ]);
                }
            });
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, `Месяц ${currentMonth}`);
            XLSX.writeFile(wb, `monthly_report_${currentMonth}.xlsx`);
        }

        // ============================================
        // ОШИБКА ЗАГРУЗКИ
        // ============================================
        function showError() {
            document.getElementById('tableBody').innerHTML = 
                '<tr><td colspan="10" style="color: #ef4444; text-align: center;">Ошибка загрузки данных</td></tr>';
        }

        // ============================================
        // АВТООБНОВЛЕНИЕ
        // ============================================
        loadData(); // Первая загрузка
        setInterval(loadData, 60000); // Обновление каждую минуту
    </script>
</body>
</html>
