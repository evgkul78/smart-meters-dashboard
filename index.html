<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умные счетчики | Мониторинг электроэнергии</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8fafc;
        }

        /* Навигация */
        .navbar {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .logo-icon {
            font-size: 2rem;
        }

        .stats-badge {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.9rem;
        }

        /* Основной контейнер */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Статистика по городам */
        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .city-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .city-card:hover {
            transform: translateY(-2px);
        }

        .city-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .city-stat {
            text-align: center;
        }

        .city-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .city-stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* Графики */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        /* Таблица счетчиков */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .table-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #f1f5f9;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }

        .device-id {
            font-weight: 600;
            color: #3b82f6;
            background: #eff6ff;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            display: inline-block;
            font-size: 0.9rem;
        }

        .location {
            display: flex;
            flex-direction: column;
        }

        .city-tag {
            font-weight: 600;
            color: #1e293b;
        }

        .address {
            font-size: 0.85rem;
            color: #64748b;
        }

        .status-online {
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-online::before {
            content: "●";
            font-size: 1.2rem;
        }

        .status-offline {
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-offline::before {
            content: "○";
            font-size: 1.2rem;
        }

        .consumed {
            font-weight: 600;
            color: #059669;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .last-update {
            text-align: right;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            
            .cities-grid {
                grid-template-columns: 1fr;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 0.85rem;
            }
            
            td, th {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span>Умные счетчики</span>
            </div>
            <div class="stats-badge" id="totalStats">
                Загрузка...
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Города -->
        <div class="cities-grid" id="citiesGrid">
            <div class="loading">Загрузка городов...</div>
        </div>

        <!-- Графики -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">📊 Потребление по городам</div>
                <canvas id="citiesChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">📈 Активность счетчиков</div>
                <canvas id="activityChart"></canvas>
            </div>
        </div>

        <!-- Таблица счетчиков -->
        <div class="table-container">
            <div class="table-header">
                <div class="table-title">📋 Список счетчиков</div>
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-filter="all">Все</button>
                </div>
            </div>
            <div class="table-responsive">
                <table id="metersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Местоположение</th>
                            <th>Описание</th>
                            <th>Начальные</th>
                            <th>Текущие</th>
                            <th>Потреблено</th>
                            <th>Статус</th>
                            <th>Обновлено</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" class="loading"><div class="spinner"></div>Загрузка данных...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4evtdt6oq7jnc168ke0';
        let metersData = null;
        let citiesChart = null;
        let activityChart = null;
        let currentFilter = 'all';

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                metersData = data;
                updateDashboard(data);
                document.getElementById('lastUpdate').textContent = 
                    'Обновлено: ' + new Date().toLocaleString('ru-RU');
            } catch (error) {
                console.error(error);
                showError();
            }
        }

        function updateDashboard(data) {
            updateCities(data.cities || {});
            updateCharts(data);
            updateTable(data.devices || {}, data.cities || {});
            updateTotalStats(data);
            updateFilters(data.cities || {});
        }

        function updateCities(cities) {
            const grid = document.getElementById('citiesGrid');
            let html = '';
            
            for (let [city, stats] of Object.entries(cities)) {
                html += `
                    <div class="city-card">
                        <div class="city-name">
                            <span>🏙️</span>
                            ${city}
                        </div>
                        <div class="city-stats">
                            <div class="city-stat">
                                <div class="city-stat-value">${stats.count}</div>
                                <div class="city-stat-label">счетчиков</div>
                            </div>
                            <div class="city-stat">
                                <div class="city-stat-value">${stats.consumed.toFixed(1)}</div>
                                <div class="city-stat-label">кВт·ч</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            if (html === '') {
                html = '<div class="loading">Нет данных по городам</div>';
            }
            
            grid.innerHTML = html;
        }

        function updateCharts(data) {
            // График по городам
            const citiesCtx = document.getElementById('citiesChart').getContext('2d');
            
            if (citiesChart) citiesChart.destroy();
            
            const cities = Object.keys(data.cities || {});
            const consumedData = cities.map(c => data.cities[c].consumed);
            const countsData = cities.map(c => data.cities[c].count);
            
            citiesChart = new Chart(citiesCtx, {
                type: 'bar',
                data: {
                    labels: cities,
                    datasets: [{
                        label: 'Потреблено (кВт·ч)',
                        data: consumedData,
                        backgroundColor: '#3b82f6',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // График активности
            const activityCtx = document.getElementById('activityChart').getContext('2d');
            
            const now = new Date();
            let online = 0, offline = 0;
            
            for (let id in data.devices) {
                const lastSeen = new Date(data.devices[id].timestamp);
                if (now - lastSeen < 30 * 60 * 1000) {
                    online++;
                } else {
                    offline++;
                }
            }
            
            if (activityChart) activityChart.destroy();
            
            activityChart = new Chart(activityCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Онлайн', 'Офлайн'],
                    datasets: [{
                        data: [online, offline],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function updateTable(devices, cities) {
            const tbody = document.getElementById('tableBody');
            let html = '';
            const now = new Date();
            
            for (let id in devices) {
                const dev = devices[id];
                
                // Фильтр по городу
                if (currentFilter !== 'all') {
                    const city = (dev.location || '').split(',')[0].trim();
                    if (city !== currentFilter) continue;
                }
                
                const lastSeen = new Date(dev.timestamp);
                const isOnline = (now - lastSeen) < 30 * 60 * 1000;
                
                const locationParts = (dev.location || '-').split(',');
                const city = locationParts[0] || '-';
                const address = locationParts.slice(1).join(',').trim() || '-';
                
                html += `<tr>
                    <td><span class="device-id">${id}</span></td>
                    <td>
                        <div class="location">
                            <span class="city-tag">${city}</span>
                            <span class="address">${address}</span>
                        </div>
                    </td>
                    <td>${dev.description || '-'}</td>
                    <td>${(dev.initial || 0).toFixed(1)}</td>
                    <td><b>${(dev.current || 0).toFixed(1)}</b></td>
                    <td><span class="consumed">${(dev.consumed || 0).toFixed(1)}</span></td>
                    <td><span class="${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? 'Онлайн' : 'Офлайн'}</span></td>
                    <td>${dev.timestamp ? dev.timestamp.slice(0,16) : '-'}</td>
                </tr>`;
            }
            
            if (html === '') {
                html = '<tr><td colspan="8" style="text-align: center;">Нет данных</td></tr>';
            }
            
            tbody.innerHTML = html;
        }

        function updateTotalStats(data) {
            const total = Object.keys(data.devices || {}).length;
            const online = Object.values(data.devices || {}).filter(d => {
                return (new Date() - new Date(d.timestamp)) < 30 * 60 * 1000;
            }).length;
            
            document.getElementById('totalStats').innerHTML = 
                `📊 Всего: ${total} | ✅ Онлайн: ${online}`;
        }

        function updateFilters(cities) {
            const filterDiv = document.getElementById('filterButtons');
            let html = '<button class="filter-btn active" data-filter="all">Все</button>';
            
            for (let city in cities) {
                html += `<button class="filter-btn" data-filter="${city}">${city}</button>`;
            }
            
            filterDiv.innerHTML = html;
            
            // Добавляем обработчики
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    updateTable(metersData.devices || {}, metersData.cities || {});
                });
            });
        }

        function showError() {
            document.getElementById('tableBody').innerHTML = 
                '<tr><td colspan="8" style="color: #ef4444; text-align: center;">Ошибка загрузки данных</td></tr>';
        }

        // Загружаем данные
        loadData();
        setInterval(loadData, 60000); // Каждую минуту
    </script>
</body>
</html>
